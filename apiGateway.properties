eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
server.port=8090

# Inventory Service
spring.cloud.gateway.routes[0].id=inventory-service
spring.cloud.gateway.routes[0].uri=lb://INVENTORYSERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/inventory/**

# Order Service
spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=lb://ORDERSERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/order/**

# Product Service
spring.cloud.gateway.routes[2].id=product-service
spring.cloud.gateway.routes[2].uri=lb://PRODUCTSERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/product/**

# Payment Service
spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://PAYMENTSERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/payment/**

# Cart Service
spring.cloud.gateway.routes[4].id=cart-service
spring.cloud.gateway.routes[4].uri=lb://CARTSERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/cart/**

# User Service
spring.cloud.gateway.routes[5].id=user-service
spring.cloud.gateway.routes[5].uri=lb://USERSERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/user/**
