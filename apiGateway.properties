eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
server.port=8090

# Inventory Service
spring.cloud.gateway.routes[0].id=inventory-service
spring.cloud.gateway.routes[0].uri=lb://inventoryService
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/inventorys/**

# Order Service
spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=lb://orderService
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/orders/**

# Product Service
spring.cloud.gateway.routes[2].id=product-service
spring.cloud.gateway.routes[2].uri=lb://productService
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/products/**

# Payment Service
spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://paymentService
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/payments/**

# Cart Service
spring.cloud.gateway.routes[4].id=cart-service
spring.cloud.gateway.routes[4].uri=lb://cartService
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/carts/**

# User Service
spring.cloud.gateway.routes[5].id=user-service
spring.cloud.gateway.routes[5].uri=lb://userService
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/users/**, /api/v1/roles/**, /api/v1/addresses/**


# Auth Service
spring.cloud.gateway.routes[6].id=auth-service
spring.cloud.gateway.routes[6].uri=lb://authService
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/auth/**
